---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: kino
description: My Kinoite image
base-image: ghcr.io/ublue-os/kinoite-main
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - toroidalfox/kime
        - atim/starship
    install:
      packages:
        # Input method
        - kime-git

        # Editors
        - emacs
        - neovim

        # Terminal
        - alacritty
        - kitty

        # Shell
        - zsh
        - starship

        # Document tools
        - zathura
        - zathura-pdf-poppler
        - perl-core

        # Modern CLI
        - eza
        - bat
        - ripgrep
        - fd-find
        - fzf
        - zoxide
        - git-delta
        - trash-cli
        - fastfetch
        - jq

        # System monitoring
        - btop
        - htop
        - powertop

        # Utilities
        - chezmoi
        - p7zip
        - podman-compose
        - gh

        # Networking
        - tailscale
        - syncthing

        # Theming
        - papirus-icon-theme

    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: brew
    nofile-limits: true
    brew-analytics: false

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          # Browser
          - app.zen_browser.zen

          # Communication
          - eu.betterbird.Betterbird
          - me.proton.Mail

          # Media
          - com.spotify.Client
          - io.github.celluloid_player.Celluloid

          # Productivity
          - org.libreoffice.LibreOffice
          - org.kde.okular

          # Security & networking
          - com.bitwarden.desktop
          - com.protonvpn.www
          - org.fkoehler.KTailctl

          # System tools
          - org.fedoraproject.MediaWriter
          - com.github.tchx84.Flatseal
          - com.usebottles.bottles
      - notify: false
        scope: user

  - type: fonts
    fonts:
      nerd-fonts:
        - FiraCode
        - Hack
        - SourceCodePro
        - JetBrainsMono
        - NerdFontsSymbolsOnly
      google-fonts:
        - Roboto
        - NotoSansKorean

  - type: systemd
    system:
      enabled:
        - tailscaled.service
    user:
      enabled:
        - syncthing.service
        - emacs.service

  - type: script
    scripts:
      - dirs.sh

  - type: signing
